ound"/></g><text x="26" y="7" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#1A1A1A">Absorbs moisture where breached</text></g><g transform="translate(1030,803)"><circle cx="0" cy="0" r="15" fill="#D6263A"/><g transform="translate(0,0)"><path d="M -6 -6 L 6 6 M 6 -6 L -6 6" fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round"/></g><text x="26" y="7" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#1A1A1A">Heavier, holds heat longer</text></g><line x1="800.0" y1="170" x2="800.0" y2="880" stroke="#E5E1D8" stroke-width="2"/><circle cx="800.0" cy="430.0" r="34" fill="#0A2A4E"/><text x="800.0" y="439.0" font-family="Archivo, Arial, sans-serif" font-size="26" font-weight="800" fill="white" text-anchor="middle">vs</text><text x="40" y="902" font-family="Inter, Arial, sans-serif" font-size="20" fill="#6B7785" text-anchor="start">Cellular PVC has no wood to protect, which is why it wins on moisture, weight, cut edges, and lifespan.</text><text x="1560" y="902" font-family="Archivo, Arial, sans-serif" font-size="20" font-weight="700" fill="#0A2A4E" text-anchor="end">ameridex.com</text></svg>