<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- V2: Top-down deck cross-section. Two PVC boards with red Dexerdry seal between, navy field -->
  <defs>
    <clipPath id="rounded2">
      <rect x="2" y="2" width="60" height="60" rx="10" ry="10"/>
    </clipPath>
    <linearGradient id="boardSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E1D2"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#rounded2)">
    <!-- Navy background -->
    <rect x="0" y="0" width="64" height="64" fill="#0A2A4E"/>

    <!-- Top board (cellular PVC, off-white) -->
    <rect x="6" y="14" width="22" height="36" rx="2" ry="2" fill="url(#boardSheen)"/>
    <!-- Subtle top cap line on board (ASA cap) -->
    <rect x="6" y="14" width="22" height="3" fill="#0A2A4E" opacity="0.10"/>

    <!-- Bottom board -->
    <rect x="36" y="14" width="22" height="36" rx="2" ry="2" fill="url(#boardSheen)"/>
    <rect x="36" y="14" width="22" height="3" fill="#0A2A4E" opacity="0.10"/>

    <!-- Red Dexerdry TPE seal between boards -->
    <rect x="29" y="14" width="6" height="36" fill="#D6263A"/>
    <!-- Seal mushroom anchors top + bottom -->
    <rect x="27" y="14" width="10" height="3" rx="1" fill="#D6263A"/>
    <rect x="27" y="47" width="10" height="3" rx="1" fill="#D6263A"/>

    <!-- Water drop on top center, indicating shed water -->
    <path d="M 32 4 C 32 4 28 7.5 28 10 C 28 12.2 29.8 14 32 14 C 34.2 14 36 12.2 36 10 C 36 7.5 32 4 32 4 Z"
          fill="#7AB8F5"/>
  </g>
  <rect x="2" y="2" width="60" height="60" rx="10" ry="10"
        fill="none" stroke="#08213D" stroke-width="1"/>
</svg>
